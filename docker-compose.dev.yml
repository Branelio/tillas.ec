# ==========================================
# TILLAS.EC — Docker Compose (Desarrollo Local)
# Solo infraestructura: DB + Redis + Minio
# Las apps se ejecutan localmente con npm run dev
# ==========================================
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tillas-db-dev
    environment:
      POSTGRES_DB: tillas
      POSTGRES_USER: tillas_user
      POSTGRES_PASSWORD: tillas_dev_123
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tillas_user -d tillas"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tillas-redis-dev
    command: redis-server --requirepass tillas_redis_dev
    volumes:
      - redis_dev:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: tillas-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tillas_minio_dev
      MINIO_ROOT_PASSWORD: tillas_minio_secret_dev
    volumes:
      - minio_dev:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_dev:
  redis_dev:
  minio_dev:
