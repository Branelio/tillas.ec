# ==========================================
# TILLAS.EC — Docker Compose (Dokploy Production)
# Optimizado para despliegue en Oracle Cloud
# IP: 158.247.126.105
# ==========================================
version: "3.9"

services:
  # === Backend API ===
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: tillas-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - API_URL=https://api.tillas.ec
      - WEB_URL=https://tillas.ec
      - ADMIN_URL=https://admin.tillas.ec
      - CORS_ORIGIN=https://tillas.ec,https://www.tillas.ec,https://admin.tillas.ec
      - LOG_LEVEL=info
      - LOG_FORMAT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.tillas.ec`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      - "traefik.http.routers.api.middlewares=api-security-headers,api-rate-limit"
      # Security Headers
      - "traefik.http.middlewares.api-security-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.api-security-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.api-security-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.api-security-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      - "traefik.http.middlewares.api-security-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.api-security-headers.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'"
      # Rate Limiting
      - "traefik.http.middlewares.api-rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.burst=50"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.period=1m"
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Web (Next.js) ===
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.tillas.ec
    container_name: tillas-web
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tillas.ec
      - API_URL=https://api.tillas.ec
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`tillas.ec`) || Host(`www.tillas.ec`)"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.routers.web.middlewares=web-security-headers,web-compress"
      # Security Headers
      - "traefik.http.middlewares.web-security-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.web-security-headers.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.web-security-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.web-security-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      - "traefik.http.middlewares.web-security-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
      # Compression
      - "traefik.http.middlewares.web-compress.compress=true"
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Admin Panel ===
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.tillas.ec
    container_name: tillas-admin
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tillas.ec
      - API_URL=https://api.tillas.ec
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.tillas.ec`)"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=3001"
      - "traefik.http.routers.admin.middlewares=admin-security-headers"
      # Security Headers for Admin
      - "traefik.http.middlewares.admin-security-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.admin-security-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.admin-security-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.admin-security-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      # Optional: IP Whitelist for Admin (uncomment and adjust)
      # - "traefik.http.middlewares.admin-ipwhitelist.ipwhitelist.sourcerange=158.247.126.105"
      # - "traefik.http.routers.admin.middlewares=admin-security-headers,admin-ipwhitelist"
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: tillas-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      POSTGRES_MAX_CONNECTIONS: "100"
      POSTGRES_SHARED_BUFFERS: "512MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "1536MB"
      POSTGRES_WORK_MEM: "16MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "128MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-backup.sh:/docker-entrypoint-initdb.d/backup-cron.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: tillas-redis
    restart: unless-stopped
    env_file: .env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Minio (S3 self-hosted) ===
  minio:
    image: minio/minio:latest
    container_name: tillas-minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: https://media-console.tillas.ec
      MINIO_PUBLIC_URLS: https://media.tillas.ec
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=Host(`media.tillas.ec`)"
      - "traefik.http.routers.media.tls=true"
      - "traefik.http.routers.media.tls.certresolver=letsencrypt"
      - "traefik.http.services.media.loadbalancer.server.port=9000"
      - "traefik.http.routers.media.middlewares=media-security"
      - "traefik.http.routers.media-console.rule=Host(`media-console.tillas.ec`)"
      - "traefik.http.routers.media-console.tls=true"
      - "traefik.http.routers.media-console.tls.certresolver=letsencrypt"
      - "traefik.http.services.media-console.loadbalancer.server.port=9001"
      # Media security headers
      - "traefik.http.middlewares.media-security.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.media-security.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Backup Automático (Opcional) ===
  backup:
    image: postgres:16-alpine
    container_name: tillas-backup
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - backup_data:/backups
    entrypoint: |
      sh -c '
        while true; do
          pg_dump -h postgres -U $$DB_USER -d $$DB_NAME | gzip > /backups/tillas_$$$(date +%Y%m%d_%H%M%S).sql.gz
          find /backups -name "*.sql.gz" -mtime +7 -delete
          sleep 86400
        done
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tillas-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backup_data:
    driver: local

networks:
  tillas-network:
    driver: bridge
