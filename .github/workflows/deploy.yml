name: Deploy Tillas.ec a Oracle Cloud / Dokploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/tillas-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/tillas-web
  ADMIN_IMAGE: ghcr.io/${{ github.repository_owner }}/tillas-admin

jobs:
  # ============================================
  # 1. Lint & Type Check
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Lint API
        run: |
          cd packages/api && npm ci
          npx tsc --noEmit

      - name: Build Web
        run: |
          cd apps/web && npm ci
          npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.tillas.ec

      - name: Build Admin
        run: |
          cd apps/admin && npm ci
          npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.tillas.ec

  # ============================================
  # 2. Build & Push Docker Images
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # --- API ---
      - name: Build y push imagen API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Web ---
      - name: Build y push imagen Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.tillas.ec
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Admin ---
      - name: Build y push imagen Admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.ADMIN_IMAGE }}:latest
            ${{ env.ADMIN_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.tillas.ec
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 3. Trigger Dokploy Redeploy
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Dokploy API Redeploy
        run: |
          curl --fail-with-body -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_API_APP_ID }}"}'

      - name: Trigger Dokploy Web Redeploy
        run: |
          curl --fail-with-body -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_WEB_APP_ID }}"}'

      - name: Trigger Dokploy Admin Redeploy
        run: |
          curl --fail-with-body -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_ADMIN_APP_ID }}"}'

      - name: Notificar deploy exitoso
        if: success()
        run: echo "✅ Deploy exitoso — API + Web + Admin actualizados en producción"
